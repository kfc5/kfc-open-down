name: 部署时注入API Key

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 注入 API Key 到 JS 文件
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 创建一个配置文件，把 Secret 写入
          echo "window.DEEPSEEK_API_KEY = '$DEEPSEEK_API_KEY';" > config.js
          # 或者直接替换 HTML 中的占位符
          sed -i "s/{{DEEPSEEK_API_KEY}}/$DEEPSEEK_API_KEY/g" index.html
      
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
