name: 七牛云同步

on:
  push:
    branches: [ master ]  # 当推送到 main 分支时触发
  workflow_dispatch:    # 支持手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-js: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build  # 根据你的项目调整构建命令
        
      - name: Deploy to Qiniu Cloud
        uses: peaceiris/actions-qiniu-sync@v1
        with:
          accessKey: ${{ secrets.QINIU_AK }}
          secretKey: ${{ secrets.QINIU_SK }}
          bucket: ${{ secrets.QINIU_BUCKET }}
          zone: ${{ secrets.QINIU_ZONE }}
          sourceDir: ./docs  # 需要上传的文件夹，根据项目调整
