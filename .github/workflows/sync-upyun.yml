name: 同步又拍云

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装又拍云命令行工具
        run: |
          pip install upyun-cli

      - name: 同步文件到又拍云
        run: |
          upyun-cli sync ./ \
            --bucket ${{ secrets.UPYUN_BUCKET }} \
            --username ${{ secrets.UPYUN_OPERATOR }} \
            --password ${{ secrets.UPYUN_PASSWORD }} \
            --include "*.html" \
            --include "*.css" \
            --include "*.js" \
            --include "images/**" \
            --exclude "*"