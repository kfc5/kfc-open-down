name: 同步又拍云

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装又拍云 CLI
        run: |
          wget https://collection.b0.upaiyun.com/softwares/upx/linux/latest/upx
          chmod +x upx
          sudo mv upx /usr/local/bin/

      - name: 同步文件到又拍云
        run: |
          upx login -a ${{ secrets.UPYUN_BUCKET }} -u ${{ secrets.UPYUN_OPERATOR }} -p ${{ secrets.UPYUN_PASSWORD }}
          upx sync ./ / --delete
