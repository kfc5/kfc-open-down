# .github/workflows/sync-upyun.yml
name: 同步到又拍云

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:  # ← 加上这行，允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 同步文件到又拍云
        uses: her-cat/upyun-deployer@v1
        with:
          bucket: ${{ secrets.UPYUN_BUCKET }}      # 你的又拍云服务名
          operator: ${{ secrets.UPYUN_OPERATOR }}   # 你的操作员名
          password: ${{ secrets.UPYUN_PASSWORD }}   # 你的操作员密码
          dir: ./                                   # 要同步的本地目录，./ 表示整个项目
          exclude: '.git/*'
