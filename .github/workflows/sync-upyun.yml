name: "又拍云"

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 同步又拍云
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Upyun SDK
        run: pip install upyun

      - name: Create upload script
        run: |
          cat > upload.py << 'EOF'
          import upyun
          import os

          bucket = os.environ["UPYUN_BUCKET"]
          operator = os.environ["UPYUN_OPERATOR"]
          password = os.environ["UPYUN_PASSWORD"]

          up = upyun.UpYun(bucket, operator, password)

          for root, dirs, files in os.walk("./docs"):
              for file in files:
                  local_path = os.path.join(root, file)
                  remote_path = local_path.replace("./docs", "", 1)
                  with open(local_path, "rb") as f:
                      up.put(remote_path, f)
                  print(f"Uploaded: {remote_path}")
          EOF

      - name: Upload to Upyun
        env:
          UPYUN_BUCKET: ${{ secrets.UPYUN_BUCKET }}
          UPYUN_OPERATOR: ${{ secrets.UPYUN_OPERATOR }}
          UPYUN_PASSWORD: ${{ secrets.UPYUN_PASSWORD }}
        run: python upload.py