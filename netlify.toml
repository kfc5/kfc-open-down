[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://kfc.brmkweb.cn"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"

[build]
  publish = "docs"
  ignore = """
  # 检查是否是首次构建
  if ! git rev-parse HEAD^ > /dev/null 2>&1; then
    echo "🚀 First build, proceeding..."
    exit 1
  fi
  
  # 检查 docs 文件夹是否有变化
  if git diff --quiet HEAD^ HEAD docs/; then
    echo "📁 No changes in docs folder, skipping build"
    exit 0
  else
    echo "🔄 Changes detected in docs folder, starting build"
    exit 1
  fi
  """