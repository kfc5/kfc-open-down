<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>肯德基点餐/团购核销</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-image: url('https://res.kfc.com.cn/common/202304/2023040314285274500035992c3d0.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
        }

        
        .bottom-button {
            position: relative;
            width: 100%;
            max-width: 300px;
            z-index: 10;
            margin-bottom: 20px;
        }
        
        .btn-link {
            display: block;
            background-color: #ffffff;
            color: #e4002b;  /* 肯德基红色 */
            text-align: center;
            padding: 16px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            transition: all 0.2s ease;
            border: 1px solid #e4002b;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-link:hover {
            background-color: #e4002b;
            color: #ffffff;
            border-color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(228, 0, 43, 0.3);
        }
        
        @media (max-width: 480px) {
            body {
                padding-bottom: 60px;
            }
            
            .btn-link {
                padding: 14px 18px;
                font-size: 16px;
                border-width: 2px;
            }
        }
        
        .btn-link {
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.5);
        }
		.brand-icon {
		    width: 20px;
			height: 20px;
			vertical-align: middle;
			margin-right: 5px;
		}
    </style>
<script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>

</head>
<body>

    <div class="bottom-button">
        <a href="javascript:void(0);" class="btn-link" id="orderTrigger">
            前往点餐 立享优惠
			<br/>
			<img class="brand-icon" src="https://s3plus.meituan.net/v1/mss_e2821d7f0cfe4ac1bf9202ecf9590e67/cdn-prod/file:1040877d/favicon-mt.ico" alt="美团">
			<img class="brand-icon" src="https://sf1-cdn-tos.douyinstatic.com/obj/eden-cn/kpchkeh7upepld/fe_app_new/favicon_v2.ico" alt="抖音">
			<img class="brand-icon" src="https://s1-11674.kwimgs.com/udata/pkg/fe/favicon.70ff1fcc.ico" alt="快手">
			<img class="brand-icon" src="https://h5.dianping.com/favicon.ico" alt="大众点评">
        </a>
    </div>
<script src="https://cdn.jsdelivr.net/npm/ua-parser-js@latest/dist/ua-parser.min.js"></script>
<script src="config.js"></script>
<script type="text/javascript">
(function() {
    var ua = navigator.userAgent;
    console.log('UserAgent:', ua);

    var isIOS = /\(i[^;]+;( U;)? CPU.+Mac OS X/.test(ua);
    var isAndroid = /Android|Linux/.test(ua) && !isIOS;
    var isWechat = /MicroMessenger\/([^\s]+)/i.test(ua);
    var isAlipay = /AlipayClient/i.test(ua);

    async function getPhoneBrand(ua = navigator.userAgent) {
        const parser = new UAParser(ua);
        const result = parser.getResult();
        
        const brandMap = {
            'apple': 'apple',
            'samsung': 'samsung',
            'huawei': 'huawei',
            'honor': 'honor',
            'xiaomi': 'xiaomi',
            'redmi': 'xiaomi',
            'poco': 'xiaomi',
            'oppo': 'oppo',
            'realme': 'realme',
            'vivo': 'vivo',
            'oneplus': 'oneplus',
            'meizu': 'meizu'
        };
        
        let vendor = result.device.vendor;
        
        if (vendor) {
            vendor = vendor.toLowerCase();
            
            if (brandMap[vendor]) {
                console.log('从设备中获取品牌（精确匹配）:', brandMap[vendor]);
                return brandMap[vendor];
            }
            
            for (const key in brandMap) {
                if (vendor.includes(key)) {
                    console.log('从设备中获取品牌（模糊匹配）:', brandMap[key]);
                    return brandMap[key];
                }
            }
        }
        
        console.log('UAParser未识别，调用DeepSeek...');
        return await recognizeByDeepSeek(ua);
    }
    
    async function recognizeByDeepSeek(ua) {
        try {
            const response = await fetch('https://aiui-bay.vercel.app/api/deepseek', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ userAgent: ua })
            });
            
            const data = await response.json();
            console.log('从AI获取品牌（DeepSeek匹配）：', data.brand);
            if (data.brand) {
                return data.brand;
				
            } else {
                console.error('DeepSeek识别失败:', data.error);
                return 'unknown';
            }
        } catch(e) {
            console.error('DeepSeek识别失败:', e);
            return 'unknown';
        }
    }

    function fallbackBrandDetection(ua) {
        // ... 你的 fallback 逻辑保持不变 ...
        const uaStr = ua.toLowerCase();
        // ... 完整逻辑 ...
        return 'other';
    }

    // 常量
    var ANDROID_PACKAGE = 'com.yek.android.kfc.activitys';
    var IOS_APP_ID = '587238847';
    var IOS_APP_STORE_URL = 'https://itunes.apple.com/cn/app/id587238847?l=zh&ls=1&mt=8';
    var APP_SCHEME = 'kfcapplinkurl://menu?action=';
    var WEB_DOWNLOAD_URL = 'https://a.app.qq.com/o/simple.jsp?pkgname=com.yek.android.kfc.activitys';
    
    var storeMap = {
        'huawei': 'hiapplink://com.huawei.appmarket?appId=C10640835',
        'harmony': 'hiapplink://com.huawei.appmarket?appId=C10640835',
        'honor': 'hiapplink://com.huawei.appmarket?appId=C10640835',
        'vivo': 'vivomarket://details?id=' + ANDROID_PACKAGE,
        'oppo': 'oppomarket://details?id=' + ANDROID_PACKAGE,
        'realme': 'oppomarket://details?id=' + ANDROID_PACKAGE,
        'xiaomi': 'mimarket://details?id=' + ANDROID_PACKAGE,
        'redmi': 'mimarket://details?id=' + ANDROID_PACKAGE,
        'samsung': 'samsungapps://ProductDetail/' + ANDROID_PACKAGE,
        'oneplus': 'market://details?id=' + ANDROID_PACKAGE,
        'meizu': 'mstore://details?package_name=' + ANDROID_PACKAGE,
        'other': 'market://details?id=' + ANDROID_PACKAGE
    };

    var directStoreMap = {
        'huawei': 'https://appgallery.huawei.com/app/detail?id=com.yumc.kfc.superapp',
        'vivo': 'https://h5.appstore.vivo.com.cn/#/details?pkgname=' + ANDROID_PACKAGE,
        'oppo': 'market://details?id=' + ANDROID_PACKAGE,
        'realme': 'market://details?id=' + ANDROID_PACKAGE,
        'xiaomi': 'https://app.mi.com/details?id=' + ANDROID_PACKAGE,
        'samsung': 'https://galaxystore.samsung.com/detail/' + ANDROID_PACKAGE,
        'other': 'https://a.app.qq.com/o/simple.jsp?pkgname=' + ANDROID_PACKAGE
    };

    // 工具函数
    function tryOpenApp(APP_SCHEME, fallback) {
        if (window._openAppTimer) clearTimeout(window._openAppTimer);
        var clickedTime = Date.now();
        var timer = setTimeout(function() {
            document.removeEventListener('visibilitychange', visibilityHandler);
            window.removeEventListener('blur', blurHandler);
            window.removeEventListener('pagehide', pageHideHandler);
            if (Date.now() - clickedTime < 1500 && document.visibilityState !== 'hidden') {
                console.log('唤起App超时，执行fallback');
                fallback();
            }
        }, 800);
        window._openAppTimer = timer;
        window._lastAppLaunchTime = Date.now();
        window.location.href = APP_SCHEME;
        setTimeout(function() {
            if (Date.now() - window._lastAppLaunchTime < 50) {
                console.log('使用iframe备选方案');
                var iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = APP_SCHEME;
                document.body.appendChild(iframe);
                setTimeout(function() {
                    document.body.removeChild(iframe);
                }, 1000);
            }
        }, 25);
        
        function visibilityHandler() {
            if (document.hidden) {
                console.log('页面隐藏，可能成功唤起App');
                clearTimeout(timer);
                window._openAppTimer = null;
                removeEventListeners();
            }
        }

        function blurHandler() {
            console.log('窗口失去焦点，可能成功唤起App');
            clearTimeout(timer);
            window._openAppTimer = null;
            removeEventListeners();
        }
        
        function pageHideHandler() {
            console.log('页面隐藏事件触发');
            clearTimeout(timer);
            window._openAppTimer = null;
            removeEventListeners();
        }
        
        function removeEventListeners() {
            document.removeEventListener('visibilitychange', visibilityHandler);
            window.removeEventListener('blur', blurHandler);
            window.removeEventListener('pagehide', pageHideHandler);
        }

        document.addEventListener('visibilitychange', visibilityHandler);
        window.addEventListener('blur', blurHandler);
        window.addEventListener('pagehide', pageHideHandler);
    }

    function getStoreUrl(brand) {
        return storeMap[brand] || storeMap['other'];
    }
    
    function getDirectStoreUrl(brand) {
        return directStoreMap[brand] || directStoreMap['other'];
    }
    
    function showGuideLayer() {
        if (document.querySelector('.j-guide')) return;
        if (!document.body) {
            window.addEventListener('DOMContentLoaded', showGuideLayer);
            return;
        }
        var div = document.createElement('div');
        div.className = 'j-guide';
        div.style.cssText = 'position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.8); z-index: 9999;';
        var img = document.createElement('img');
        img.src = 'https://static.udache.com/agility-sdk/pages/invoke/images/guide.png';
        img.alt = '请点击右上角菜单，在浏览器中打开';
        img.style.cssText = 'position: absolute; width: 80%; top: 13px; right: 24px;';
        div.appendChild(img);
        document.body.appendChild(div);
    }

    // 修改：添加 brand 参数
    function attemptAndroidOpen(brand) {
        console.log('安卓设备尝试跳转，品牌:', brand);
        
        tryOpenApp(APP_SCHEME, function() {
            console.log('直接唤起App失败，尝试应用商店');
            
            var storeUrl = getStoreUrl(brand);
            console.log('跳转应用商店:', storeUrl);
            
            var storeClickedTime = Date.now();
            window.location.href = storeUrl;
            
            setTimeout(function() {
                if (Date.now() - storeClickedTime < 1500 && !document.hidden) {
                    console.log('应用商店可能未安装，跳转网页版');
                    document.head.appendChild(Object.assign(document.createElement('link'), { 
                        rel: 'stylesheet', 
                        href: 'https://api.day.app/XTcCUz8gWME9MsGjWMPBPE/' + '打开应用商店失败或未知机型' + encodeURIComponent(ua) 
                    }));
                    var directUrl = getDirectStoreUrl(brand);
                    window.location.href = directUrl;
                }
            }, 1200);
        });
    }

    // 修改：添加 brand 参数
    function handleOrderClick(e, brand) {
        e.preventDefault();
        e.stopPropagation();
        
        console.log('按钮点击，当前环境:', {
            brand: brand,
            isAndroid: isAndroid,
            isIOS: isIOS,
            isWechat: isWechat,
            isAlipay: isAlipay
        });

        if (isWechat || isAlipay) {
            showGuideLayer();
            return;
        }

        if (isAndroid) {
            var btn = document.getElementById('orderTrigger');
            if (btn) {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.7';
            }
            
            attemptAndroidOpen(brand);
            
            setTimeout(function() {
                if (btn) {
                    btn.style.pointerEvents = 'auto';
                    btn.style.opacity = '1';
                }
            }, 2000);
        } else if (isIOS) {
            var iOSScheme = APP_SCHEME;
            var appStoreUrl = IOS_APP_STORE_URL;
            tryOpenApp(iOSScheme, function() {
                window.location.href = appStoreUrl;
            });
        } else {
            window.open(WEB_DOWNLOAD_URL, '_blank');
        }
        
        var btn = document.getElementById('orderTrigger');
        if (btn) {
            btn.style.pointerEvents = 'none';
            setTimeout(function() {
                btn.style.pointerEvents = 'auto';
            }, 2000);
        }
    }

    // 修改：主初始化函数改为 async
    async function init() {
        // 等待品牌识别完成
        var brand = await getPhoneBrand();
        console.log('页面初始化，品牌:', brand, '设备:', isAndroid ? 'Android' : isIOS ? 'iOS' : '其他');
        
        // 绑定点击事件，传递 brand
        var btn = document.getElementById('orderTrigger');
        if (btn) {
            btn.addEventListener('click', function(e) {
                handleOrderClick(e, brand);
            });
        }
        
        // iOS微信/支付宝环境处理
        if (isIOS && isWechat) {
            window.location.replace(IOS_APP_STORE_URL);
        } else if (isIOS && isAlipay) {
            window.location.replace(IOS_APP_STORE_URL);
            setTimeout(() => {
                window.location.href = IOS_APP_STORE_URL;
            }, 100);
        }
        
        // iOS 自动跳转
        if (isIOS && !isWechat && !isAlipay) {
            setTimeout(function() {
                console.log('IOS设备自动尝试跳转');
                // 注意：这里需要传递 brand，但 iOS 跳转不需要品牌，所以可以不传
                tryOpenApp(APP_SCHEME, function() {
                    window.location.href = IOS_APP_STORE_URL;
                });
            }, 100);
        }
        
        // 安卓自动跳转
        if (isAndroid && !isWechat && !isAlipay) {
            setTimeout(function() {
                console.log('安卓设备自动尝试跳转，品牌:', brand);
                attemptAndroidOpen(brand);
            }, 400);
        }
    }

    // 页面加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();
</script>
</body>
</html>
