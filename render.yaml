services:
  - type: web
    name: zero-a2lf
    runtime: static
    plan: free
    buildCommand: ""  # 静态文件无需构建
    staticPublishPath: ./docs
    envVars:
      - key: NODE_VERSION
        value: "20"
    headers:
      # CORS 配置（允许你的域名跨域访问）
      - path: /*
        name: Access-Control-Allow-Origin
        value: "https://kfc.brmkweb.cn"
      - path: /*
        name: Access-Control-Allow-Methods
        value: "GET, HEAD, OPTIONS"
      - path: /*
        name: Access-Control-Allow-Headers
        value: "*"
      # 缓存控制
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html