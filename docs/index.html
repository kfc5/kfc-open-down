<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>肯德基App · 限时领券</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #fff5e8 0%, #ffede0 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
        }

        /* 肯德基品牌卡片 */
        .card {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(228, 0, 43, 0.1);
            overflow: hidden;
            text-align: center;
            padding: 40px 24px 48px;
            transition: all 0.2s ease;
        }

        .kfc-logo {
            width: 80px;
            height: 80px;
            background: #e4002b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 14px rgba(228, 0, 43, 0.3);
        }

        .kfc-logo span {
            font-size: 44px;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #e4002b;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .tagline {
            font-size: 16px;
            color: #b45f1b;
            background: #fff0e0;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .offer-box {
            background: #fef7e0;
            border-radius: 32px;
            padding: 20px 16px;
            margin: 20px 0 24px;
            border: 1px dashed #ffb347;
        }

        .price-big {
            font-size: 42px;
            font-weight: 800;
            color: #e4002b;
        }

        .price-big small {
            font-size: 18px;
            font-weight: 500;
        }

        .desc {
            color: #5a3e1b;
            font-size: 15px;
            line-height: 1.4;
            margin-top: 8px;
        }

        .btn-download {
            display: block;
            width: 100%;
            background: linear-gradient(105deg, #e4002b 0%, #c20025 100%);
            border: none;
            padding: 18px 12px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            text-align: center;
            margin: 20px 0 16px;
            box-shadow: 0 8px 18px rgba(228, 0, 43, 0.3);
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-download:active {
            transform: scale(0.97);
            background: #b00022;
        }

        .note {
            font-size: 12px;
            color: #aa8a66;
            background: #fff6ed;
            padding: 12px;
            border-radius: 28px;
            margin-top: 20px;
        }

        .footnote {
            font-size: 11px;
            color: #bba88a;
            margin-top: 24px;
        }

        hr {
            margin: 16px 0;
            border: none;
            height: 1px;
            background: #ffe0c0;
        }

        @media (max-width: 500px) {
            .card {
                padding: 28px 20px 36px;
            }
            h1 {
                font-size: 26px;
            }
            .btn-download {
                padding: 16px 12px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="kfc-logo">
        <span>KFC</span>
    </div>
    <h1>📱 肯德基App</h1>
    <div class="tagline">✨ 新客专享 · 点餐立减 ✨</div>

    <div class="offer-box">
        <div class="price-big">
            ￥8 <small>满减券</small>
        </div>
        <div class="price-big" style="font-size: 28px; margin-top: 6px;">
            + 免费蛋挞 🥧
        </div>
        <div class="desc">
            下载App即领<br>限时福利，到店/宅急送通用
        </div>
    </div>

    <button class="btn-download" id="downloadBtn">🍔 下载肯德基App领优惠 🍟</button>

    <div class="note">
        💡 提示：若无法直接下载，请点击右上角「…」<br>选择「在浏览器中打开」即可正常下载。
    </div>
    <div class="footnote">
        活动最终解释权归肯德基所有
    </div>
</div>

<script>
    // 环境检测
    var ua = navigator.userAgent;
    var isWechat = /MicroMessenger/i.test(ua);
    var isAlipay = /AlipayClient/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var isAndroid = /Android/i.test(ua);

    // 下载链接（肯德基官方）
    var APP_STORE_URL = 'https://apps.apple.com/cn/app/id587779942';        // iOS App Store
    var ANDROID_STORE_MARKET = 'market://details?id=com.yek.android.kfc.activity';
    var ANDROID_WEB_FALLBACK = 'https://order.kfc.com.cn/preorder-taro/home';                // 肯德基官方点餐页

    // 官方URL Scheme (仅外部浏览器使用)
    var KFC_SCHEME = 'kfcapplinkurl://menu?action=';

    function openInExternalBrowser() {
        if (isIOS) {
            // iOS 在 Safari 中可以直接跳转App Store（符合规范）
            window.location.href = APP_STORE_URL;
        } else if (isAndroid) {
            // 尝试跳转应用商店
            window.location.href = ANDROID_STORE_MARKET;
            // 降级：如果无法跳转市场，1秒后跳转网页
            setTimeout(function() {
                // 检查页面是否还在当前窗口（如果在商店页面会隐藏当前页）
                if (!document.hidden) {
                    window.location.href = ANDROID_WEB_FALLBACK;
                }
            }, 800);
        } else {
            // 其他设备直接走官方下载页
            window.location.href = ANDROID_WEB_FALLBACK;
        }
    }

    // 微信/支付宝内：仅友好提示，不做任何自动跳转或唤起
    function showFriendlyGuide() {
        alert('请点击右上角“...”菜单，选择“在浏览器中打开”\n即可下载肯德基App并领取优惠券。');
    }

    // 按钮点击处理
    var btn = document.getElementById('downloadBtn');
    if (btn) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();

            // 在微信或支付宝中 —— 仅提示，绝不自动跳转（过审关键）
            if (isWechat || isAlipay) {
                showFriendlyGuide();
                return;
            }

            // 外部浏览器（Safari、Chrome等）—— 正常唤起下载或App
            // 尝试先唤起App（如果已安装）
            if (isIOS || isAndroid) {
                // 尝试打开App
                var iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = KFC_SCHEME;
                document.body.appendChild(iframe);
                setTimeout(function() {
                    document.body.removeChild(iframe);
                }, 800);

                // 设定延时，如果没有唤起成功则跳转下载
                var timer = setTimeout(function() {
                    openInExternalBrowser();
                }, 1200);

                // 如果页面失去焦点，说明App成功唤起，清除下载跳转
                var onBlur = function() {
                    clearTimeout(timer);
                    window.removeEventListener('blur', onBlur);
                    window.removeEventListener('pagehide', onBlur);
                };
                window.addEventListener('blur', onBlur);
                window.addEventListener('pagehide', onBlur);
            } else {
                openInExternalBrowser();
            }
        });
    }

    // 额外注意：不在微信/支付宝内做任何自动跳转行为，完全由用户点击触发。
    console.log('环境: wechat=' + isWechat + ', alipay=' + isAlipay);
</script>
</body>
</html>
