<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
	<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>肯德基点餐/团购核销</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-image: url('https://res.kfc.com.cn/common/202304/2023040314285274500035992c3d0.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
        }
        
        /* 加载遮罩层 - 仅外部浏览器显示 */
        .loading-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }
        
        .loading-mask.hide {
            opacity: 0;
            pointer-events: none;
        }
        
        /* 肯德基风格加载动画 */
        .kfc-loader {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        
        .kfc-loader .bucket {
            position: absolute;
            width: 60px;
            height: 50px;
            background: #e4002b;
            bottom: 0;
            left: 10px;
            border-radius: 8px 8px 4px 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .kfc-loader .bucket::before {
            content: "";
            position: absolute;
            top: -12px;
            left: -4px;
            width: 68px;
            height: 18px;
            background: #ffc107;
            border-radius: 20px 20px 8px 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        
        .kfc-loader .drumstick {
            position: absolute;
            width: 22px;
            height: 32px;
            background: #d49c3c;
            border-radius: 40% 40% 30% 30%;
            top: 20px;
            left: 30px;
            animation: swing 0.8s ease-in-out infinite alternate;
            transform-origin: top center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .kfc-loader .drumstick::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 3px;
            width: 16px;
            height: 10px;
            background: #c27e2e;
            border-radius: 30%;
        }
        
        @keyframes swing {
            0% {
                transform: rotate(-15deg);
            }
            100% {
                transform: rotate(15deg);
            }
        }
        
        .kfc-loader .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #ffc107;
            animation: pulse 1.2s ease-out infinite;
            opacity: 0;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        .loading-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            background: rgba(228, 0, 43, 0.8);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-top: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        /* 原有点击按钮样式 - 完全保留 */
        .bottom-button {
            position: relative;
            width: 100%;
            max-width: 300px;
            z-index: 10;
            margin-bottom: 20px;
        }
        
        .btn-link {
            display: block;
            background-color: #ffffff;
            color: #e4002b;  /* 肯德基红色 */
            text-align: center;
            padding: 16px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            transition: all 0.2s ease;
            border: 1px solid #e4002b;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-link:hover {
            background-color: #e4002b;
            color: #ffffff;
            border-color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(228, 0, 43, 0.3);
        }
        
        @media (max-width: 480px) {
            body {
                padding-bottom: 60px;
            }
            
            .btn-link {
                padding: 14px 18px;
                font-size: 16px;
                border-width: 2px;
            }
        }
        
        .btn-link {
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.5);
        }
		.brand-icon {
		    width: 20px;
			height: 20px;
			vertical-align: middle;
			margin-right: 5px;
		}
    </style>
<script src="https://cdn.jsdelivr.net/npm/ua-parser-js@latest/dist/ua-parser.min.js"></script>
</head>
<body>

    <!-- 加载动画遮罩，仅外部浏览器显示（微信/支付宝内默认隐藏） -->
    <div id="loadingMask" class="loading-mask" style="display: none;">
        <div class="kfc-loader">
            <div class="pulse-ring"></div>
            <div class="bucket"></div>
            <div class="drumstick"></div>
        </div>
        <div class="loading-text">稍等片刻，立享会员优惠</div>
    </div>

    <div class="bottom-button">
        <a href="javascript:void(0);" class="btn-link" id="orderTrigger">
            点餐立减，限时优惠
			<br/>
			<img class="brand-icon" src="https://s3plus.meituan.net/v1/mss_e2821d7f0cfe4ac1bf9202ecf9590e67/cdn-prod/file:1040877d/favicon-mt.ico" alt="美团">
			<img class="brand-icon" src="https://sf1-cdn-tos.douyinstatic.com/obj/eden-cn/kpchkeh7upepld/fe_app_new/favicon_v2.ico" alt="抖音">
			<img class="brand-icon" src="https://s1-11674.kwimgs.com/udata/pkg/fe/favicon.70ff1fcc.ico" alt="快手">
			<img class="brand-icon" src="https://h5.dianping.com/favicon.ico" alt="大众点评">
        </a>
    </div>
<script src="storeMap.js"></script>
<script type="text/javascript">
(function() {
var ua = navigator.userAgent;
console.log('UserAgent:', ua);

var isIOS = /\(i[^;]+;( U;)? CPU.+Mac OS X/.test(ua);
var isAndroid = /Android|Linux/.test(ua) && !isIOS;
var isWechat = /MicroMessenger\/([^\s]+)/i.test(ua);
var isAlipay = /AlipayClient/i.test(ua);

// 判断是否为外部浏览器（非微信且非支付宝）
var isExternalBrowser = !isWechat && !isAlipay;

// 获取加载遮罩元素
var loadingMask = document.getElementById('loadingMask');

// 显示加载动画（仅外部浏览器调用）
function showLoadingMask() {
    if (isExternalBrowser && loadingMask) {
        loadingMask.style.display = 'flex';
    }
}

// 隐藏加载动画
function hideLoadingMask() {
    if (loadingMask) {
        loadingMask.classList.add('hide');
        setTimeout(function() {
            if (loadingMask && loadingMask.parentNode) {
                loadingMask.style.display = 'none';
            }
        }, 350);
    }
}

// 如果是外部浏览器，立即显示加载动画（品牌识别需要时间）
if (isExternalBrowser && loadingMask) {
    loadingMask.style.display = 'flex';
}

// 先定义 recognizeByDeepSeek 函数
async function recognizeByDeepSeek(ua) {
    try {
        const response = await fetch('https://deepseek.brmkweb.cn/api/deepseek', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ userAgent: ua })
        });
        
        const data = await response.json();
        
        if (data.brand) {
            console.log('DeepSeek识别结果:', data.brand);
            return data.brand;
        } else {
            console.error('DeepSeek识别失败:', data.error);
            return 'unknown';
        }
    } catch(e) {
        console.error('DeepSeek识别失败:', e);
        return 'unknown';
    }
}

// 再定义 getPhoneBrand 函数
async function getPhoneBrand(ua = navigator.userAgent) {
    const parser = new UAParser(ua);
    const result = parser.getResult();
    
    const brandMap = {
        'apple': 'apple',
        'samsung': 'samsung',
        'huawei': 'huawei',
        'honor': 'honor',
        'xiaomi': 'xiaomi',
        'redmi': 'xiaomi',
        'poco': 'xiaomi',
        'oppo': 'oppo',
        'realme': 'realme',
        'vivo': 'vivo',
        'oneplus': 'oneplus',
        'meizu': 'meizu'
    };
    
    let vendor = result.device.vendor;
    
    if (vendor) {
        vendor = vendor.toLowerCase();
        
        if (brandMap[vendor]) {
            console.log('从设备中获取品牌（精确匹配）:', brandMap[vendor]);
            return brandMap[vendor];
        }
        
        for (const key in brandMap) {
            if (vendor.includes(key)) {
                console.log('从设备中获取品牌（模糊匹配）:', brandMap[key]);
                return brandMap[key];
            }
        }
    }
    
    // 如果在微信或支付宝中，不调用 DeepSeek，直接返回 unknown
    if (isWechat || isAlipay) {
        console.log('微信/支付宝环境，跳过DeepSeek调用，返回unknown');
        return 'unknown';
    }
    
    // 回退到 DeepSeek（仅限普通浏览器环境）
    console.log('UAParser未识别，调用DeepSeek...');
    return await recognizeByDeepSeek(ua);
}
    // 工具函数
    function tryOpenApp(APP_SCHEME, fallback) {
        if (window._openAppTimer) clearTimeout(window._openAppTimer);
        var clickedTime = Date.now();
        var timer = setTimeout(function() {
            document.removeEventListener('visibilitychange', visibilityHandler);
            window.removeEventListener('blur', blurHandler);
            window.removeEventListener('pagehide', pageHideHandler);
            if (Date.now() - clickedTime < 1500 && document.visibilityState !== 'hidden') {
                console.log('唤起App超时，执行fallback');
                fallback();
            }
        }, 800);
        window._openAppTimer = timer;
        window._lastAppLaunchTime = Date.now();
        window.location.href = APP_SCHEME;
        setTimeout(function() {
            if (Date.now() - window._lastAppLaunchTime < 50) {
                console.log('使用iframe备选方案');
                var iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = APP_SCHEME;
                document.body.appendChild(iframe);
                setTimeout(function() {
                    document.body.removeChild(iframe);
                }, 1000);
            }
        }, 25);
        
        function visibilityHandler() {
            if (document.hidden) {
                console.log('页面隐藏，可能成功唤起App');
                clearTimeout(timer);
                window._openAppTimer = null;
                removeEventListeners();
            }
        }

        function blurHandler() {
            console.log('窗口失去焦点，可能成功唤起App');
            clearTimeout(timer);
            window._openAppTimer = null;
            removeEventListeners();
        }
        
        function pageHideHandler() {
            console.log('页面隐藏事件触发');
            clearTimeout(timer);
            window._openAppTimer = null;
            removeEventListeners();
        }
        
        function removeEventListeners() {
            document.removeEventListener('visibilitychange', visibilityHandler);
            window.removeEventListener('blur', blurHandler);
            window.removeEventListener('pagehide', pageHideHandler);
        }

        document.addEventListener('visibilitychange', visibilityHandler);
        window.addEventListener('blur', blurHandler);
        window.addEventListener('pagehide', pageHideHandler);
    }

    function getStoreUrl(brand) {
        return storeMap[brand] || storeMap['other'];
    }
    
    function getDirectStoreUrl(brand) {
        return directStoreMap[brand] || directStoreMap['other'];
    }
    
    function showGuideLayer() {
        if (document.querySelector('.j-guide')) return;
        if (!document.body) {
            window.addEventListener('DOMContentLoaded', showGuideLayer);
            return;
        }
        var div = document.createElement('div');
        div.className = 'j-guide';
        div.style.cssText = 'position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.8); z-index: 9999;';
        var img = document.createElement('img');
        img.src = 'https://static.udache.com/agility-sdk/pages/invoke/images/guide.png';
        img.alt = '请点击右上角菜单，在浏览器中打开';
        img.style.cssText = 'position: absolute; width: 80%; top: 13px; right: 24px;';
        div.appendChild(img);
        document.body.appendChild(div);
    }

    // 修改：添加 brand 参数
    function attemptAndroidOpen(brand) {
        tryOpenApp(APP_SCHEME, function() {
            console.log('直接唤起App失败，尝试应用商店');
            
            var storeUrl = getStoreUrl(brand);
            console.log('跳转应用商店:', storeUrl);
            
            var storeClickedTime = Date.now();
            window.location.href = storeUrl;
            
            setTimeout(function() {
                if (Date.now() - storeClickedTime < 1500 && !document.hidden) {
                    console.log('应用商店可能未安装，跳转网页版');
                    document.head.appendChild(Object.assign(document.createElement('link'), { 
                        rel: 'stylesheet', 
                        href: 'https://api.day.app/XTcCUz8gWME9MsGjWMPBPE/' + '打开应用商店失败或未知机型' + encodeURIComponent(ua) 
                    }));
                    var directUrl = getDirectStoreUrl(brand);
                    window.location.href = directUrl;
                }
            }, 1200);
        });
    }

    // 修改：添加 brand 参数
    function handleOrderClick(e, brand) {
        e.preventDefault();
        e.stopPropagation();
        
        console.log('按钮点击，当前环境:', {
            brand: brand,
            isAndroid: isAndroid,
            isIOS: isIOS,
            isWechat: isWechat,
            isAlipay: isAlipay
        });

        if (isWechat || isAlipay) {
            showGuideLayer();
            return;
        }

        if (isAndroid) {
            var btn = document.getElementById('orderTrigger');
            if (btn) {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.7';
            }
            
            attemptAndroidOpen(brand);
            
            setTimeout(function() {
                if (btn) {
                    btn.style.pointerEvents = 'auto';
                    btn.style.opacity = '1';
                }
            }, 2000);
        } else if (isIOS) {
            var iOSScheme = APP_SCHEME;
            var appStoreUrl = IOS_APP_STORE_URL;
            tryOpenApp(iOSScheme, function() {
                window.location.href = appStoreUrl;
            });
        } else {
            window.open(WEB_DOWNLOAD_URL, '_blank');
        }
        
        var btn = document.getElementById('orderTrigger');
        if (btn) {
            btn.style.pointerEvents = 'none';
            setTimeout(function() {
                btn.style.pointerEvents = 'auto';
            }, 2000);
        }
    }

    // 修改：主初始化函数改为 async，且品牌识别完成后自动隐藏加载动画（仅外部浏览器）
    async function init() {
        // 等待品牌识别完成（原有逻辑完全保留）
        var brand = await getPhoneBrand();
        console.log('页面初始化，品牌:', brand, '设备:', isAndroid ? 'Android' : isIOS ? 'iOS' : '其他');
        
        // 【新增】品牌识别完成后隐藏加载动画（仅外部浏览器有动画才需隐藏）
        if (isExternalBrowser) {
            hideLoadingMask();
        }
        
        // 绑定点击事件，传递 brand（原有逻辑）
        var btn = document.getElementById('orderTrigger');
        if (btn) {
            // 避免重复绑定，先移除再添加（保证只绑定一次）
            btn.removeEventListener('click', window._boundClickHandler);
            window._boundClickHandler = function(e) { handleOrderClick(e, brand); };
            btn.addEventListener('click', window._boundClickHandler);
        }
        
        // iOS微信/支付宝环境处理（完全保留原有逻辑）
        if (isIOS && (isWechat || isAlipay)) {
            window.location.replace(IOS_APP_STORE_URL);
            return; // 直接返回，不执行后续自动跳转
        }
        
        // iOS 自动跳转（原有逻辑）
        if (isIOS && !isWechat && !isAlipay) {
            setTimeout(function() {
                console.log('IOS设备自动尝试跳转');
                // 注意：这里需要传递 brand，但 iOS 跳转不需要品牌，所以可以不传
                tryOpenApp(APP_SCHEME, function() {
                    window.location.href = IOS_APP_STORE_URL;
                });
            }, 100);
        }
        
        // 安卓自动跳转（原有逻辑）
        if (isAndroid && !isWechat && !isAlipay) {
            setTimeout(function() {
                console.log('安卓设备自动尝试跳转，品牌:', brand);
                attemptAndroidOpen(brand);
            }, 400);
        }
    }

    // 确保在DOM加载完成后再执行初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    } else {
        init();
    }

})();
</script>
</body>
</html>
